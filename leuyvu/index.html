<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>404 Not Found</title> 
<!-- Favicon Integration -->
<link rel="icon" type="image/png" href="../assets/favicon.png"> 
<style> 
/* ========================================== 
   1. FONTS & ROOT VARIABLES (Coolvetica Styles) 
   ========================================== */ 
@font-face { 
  font-family: 'Coolvetica Rg'; 
  src: url('../fonts/Coolvetica Rg.otf') format('opentype'); 
  font-weight: normal; 
  font-style: normal; 
} 
@font-face { 
  font-family: 'Coolvetica Hv Comp'; 
  src: url('../fonts/Coolvetica Hv Comp.otf') format('opentype'); 
  font-weight: 900; 
  font-style: normal; 
} 
@font-face { 
  font-family: 'Coolvetica Rg Cond'; 
  src: url('../fonts/Coolvetica Rg Cond.otf') format('opentype'); 
  font-weight: bold; 
  font-style: normal; 
} 
@font-face { 
  font-family: 'Coolvetica Rg It'; 
  src: url('../fonts/Coolvetica Rg It.otf') format('opentype'); 
  font-weight: normal; 
  font-style: italic; 
} 

:root { 
  --bg-color: #E7E7E7; 
  --text-color: #1A2028; 
  --accent-red: #D35252; 
} 

* { 
  box-sizing: border-box; 
} 

body { 
  background-color: var(--bg-color); 
  color: var(--text-color); 
  font-family: 'Coolvetica Rg', sans-serif; 
  margin: 0; 
  padding: 0; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  min-height: 100vh; 
  overflow: hidden; /* Lock scroll for falling effect */ 
  position: relative; 
} 

.container { 
  width: 90%; 
  max-width: 500px; 
  text-align: center; 
  padding: 20px; 
  position: relative; 
  z-index: 5; 
  transition: opacity 0.5s ease; 
} 

/* --- PHYSICS FALLING ANIMATION --- */ 
.fall-down { 
  animation: fallPhysics 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards !important; 
  pointer-events: none; 
} 

@keyframes fallPhysics { 
  0% { transform: translateY(0) rotate(0deg); } 
  15% { transform: translateY(-25px) rotate(3deg); } 
  100% { transform: translateY(120vh) rotate(35deg); opacity: 0; } 
} 

/* ========================================== 
   2. SKYETO INTERACTION AREA 
   ========================================== */ 
.skyeto-box { 
  position: relative; 
  width: 160px; 
  height: 120px; 
  margin: 0 auto -10px auto; 
  cursor: pointer; 
  z-index: 6; 
  transition: transform 0.2s; 
} 

.skyeto-character { 
  width: 100%; 
  height: 100%; 
  object-fit: contain; 
  user-select: none; 
  -webkit-user-drag: none; 
} 

.squish-once { 
  animation: pat-squish-once 0.4s ease-out; 
} 

.heart { 
  position: absolute; 
  color: var(--accent-red); 
  font-size: 1.5rem; 
  pointer-events: none; 
  animation: float-up 0.8s ease-out forwards; 
  z-index: 10; 
} 

#pat-counter { 
  font-size: 0.9rem; 
  font-weight: bold; 
  font-family: 'Coolvetica Rg Cond', sans-serif; 
  margin-top: 5px; 
  height: 18px; 
  color: var(--text-color); 
  opacity: 0; 
  transition: opacity 0.5s ease; 
} 

#pat-counter.show { 
  opacity: 1; 
  transition: none; 
} 

/* ========================================== 
   3. 404 ERROR CODE WITH INVERT BOX 
   ========================================== */ 
.error-code-container { 
  position: relative; 
  display: inline-block; 
  margin-bottom: 25px; 
  background-color: var(--bg-color); 
  z-index: 1; 
} 

.error-code-text { 
  font-family: 'Coolvetica Hv Comp', sans-serif; 
  font-size: 6.5rem; 
  font-weight: 900; 
  letter-spacing: 4px; 
  line-height: 0.85; 
  color: var(--text-color); 
  margin: 0; 
  display: block; 
} 

.invert-box { 
  position: absolute; 
  bottom: 0; 
  left: 5%; 
  width: 90%; 
  height: 52px; 
  background-color: #FFFFFF; 
  mix-blend-mode: difference; 
  pointer-events: none; 
  z-index: 2; 
} 

/* ========================================== 
   4. LAYOUT CONTENT 
   ========================================== */ 
.error-message-box { 
  display: flex; 
  align-items: stretch; 
  text-align: left; 
  margin: 20px 0; 
  gap: 15px; 
  transition: transform 0.2s; 
} 

.left-bar { 
  width: 18px; 
  background-color: var(--text-color); 
  flex-shrink: 0; 
} 

.message-text { 
  font-family: 'Coolvetica Rg It', sans-serif; 
  font-size: 1.1rem; 
  line-height: 1.3; 
  margin: 0; 
  word-break: break-all; 
} 

.search-bar-container { 
  display: flex; 
  align-items: center; 
  width: 100%; 
  margin-top: 25px; 
  gap: 10px; 
} 

.domain-prefix { 
  font-family: 'Coolvetica Rg Cond', sans-serif; 
  font-size: 1.2rem; 
  font-weight: bold; 
  white-space: nowrap; 
} 

.input-wrapper { 
  flex-grow: 1; 
  position: relative; 
} 

.fake-input { 
  width: 100%; 
  background-color: var(--text-color); 
  color: #ffffff; 
  border: none; 
  padding: 8px 12px; 
  font-family: 'Coolvetica Rg', sans-serif; 
  font-size: 0.8rem; 
  outline: none; 
} 

.fake-input::placeholder { 
  color: #8E9AA6; 
  opacity: 0.8; 
} 

.search-icon { 
  cursor: pointer; 
  width: 28px; 
  height: 28px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  flex-shrink: 0; 
  transition: transform 0.1s; 
} 

.search-icon:active { 
  transform: scale(0.9); 
} 

.footer-info { 
  font-size: 0.75rem; 
  margin-top: 20px; 
  text-align: left; 
  color: #555; 
  font-family: 'Coolvetica Rg', sans-serif; 
} 

.secret-link { 
  color: var(--text-color); 
  text-decoration: underline; 
  font-weight: bold; 
  cursor: pointer; 
} 

.secret-link:hover { 
  color: var(--accent-red); 
} 

/* ========================================== 
   5. TOMATO ARENA (INTERACTIVE EASTER EGG) 
   ========================================== */ 
.tomato-arena { 
  position: fixed; 
  top: 0; 
  left: 0; 
  width: 100vw; 
  height: 100vh; 
  background-color: #121212; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  justify-content: center; 
  z-index: 1; 
  opacity: 0; 
  pointer-events: none; 
  transition: opacity 1s ease; 
} 

.tomato-arena.active { 
  opacity: 1; 
  pointer-events: auto; 
  z-index: 10; 
} 

.dish-wrapper { 
  position: relative; 
  width: 380px; 
  height: 380px; 
  display: flex; 
  justify-content: center; 
  align-items: center; 
  margin-bottom: 20px; 
} 

.dish-img { 
  width: 100%; 
  height: 100%; 
  object-fit: contain; 
  transition: transform 0.2s; 
  user-select: none; 
  -webkit-user-drag: none; 
} 

.leuyvu-tiktok { 
  position: absolute; 
  width: 210px; 
  border-radius: 10px; 
  box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
  z-index: 3; 
  pointer-events: none; 
  transition: transform 0.3s, opacity 0.5s; 
  user-select: none; 
  -webkit-user-drag: none; 
} 

.ingredient { 
  position: absolute; 
  width: 60px; 
  height: 60px; 
  object-fit: contain; 
  filter: drop-shadow(0 5px 8px rgba(0,0,0,0.4)); 
  z-index: 4; 
  pointer-events: none; 
  user-select: none; 
  -webkit-user-drag: none; 
} 

.tomato-fresh { top: 10px; left: 40px; transform: rotate(-15deg); width: 70px; } 
.ketchup-bottle { bottom: 10px; left: 10px; transform: rotate(20deg); width: 65px; } 
.mustard-bottle { bottom: 15px; right: 10px; transform: rotate(-25deg); width: 65px; } 

.arena-title { 
  color: #ffffff; 
  font-family: 'Coolvetica Rg Cond', sans-serif; 
  font-size: 1.8rem; 
  margin-bottom: 5px; 
  text-shadow: 0 3px 6px rgba(0,0,0,0.6); 
  text-align: center; 
} 

.arena-hint { 
  color: #ff5959; 
  font-family: 'Coolvetica Rg It', sans-serif; 
  font-size: 1rem; 
  animation: pulse 1.5s infinite; 
  margin-bottom: 20px; 
} 

@keyframes pulse { 
  0%, 100% { opacity: 0.6; } 
  50% { opacity: 1; } 
} 

/* --- WEAPON SELECTOR DOCK --- */ 
.weapon-dock { 
  display: flex; 
  gap: 15px; 
  background: rgba(255, 255, 255, 0.1); 
  padding: 10px 20px; 
  border-radius: 50px; 
  backdrop-filter: blur(10px); 
  border: 1px solid rgba(255, 255, 255, 0.2); 
  z-index: 200; 
  margin-top: 10px; 
} 

.weapon-btn { 
  background: none; 
  border: 2px solid transparent; 
  color: #fff; 
  font-family: 'Coolvetica Rg Cond', sans-serif; 
  font-size: 1rem; 
  padding: 8px 16px; 
  cursor: pointer; 
  border-radius: 30px; 
  transition: all 0.2s ease; 
  display: flex; 
  align-items: center; 
  gap: 8px; 
} 

.weapon-btn:hover { 
  background: rgba(255, 255, 255, 0.15); 
} 

.weapon-btn.active { 
  background: #ffffff; 
  color: #121212; 
  font-weight: bold; 
  box-shadow: 0 5px 15px rgba(255,255,255,0.3); 
} 

/* --- SHAKE EFFECT --- */ 
@keyframes strong-shake { 
  0% { transform: translate(0, 0) rotate(0deg); } 
  10% { transform: translate(-8px, -8px) rotate(-1.5deg); } 
  20% { transform: translate(8px, 8px) rotate(1.5deg); } 
  30% { transform: translate(-8px, 8px) rotate(-1.5deg); } 
  40% { transform: translate(8px, -8px) rotate(1.5deg); } 
  50% { transform: translate(-5px, -5px) rotate(-1deg); } 
  60% { transform: translate(5px, 5px) rotate(1deg); } 
  100% { transform: translate(0, 0) rotate(0deg); } 
} 

.arena-shake { 
  animation: strong-shake 0.25s ease-in-out; 
} 

/* --- ANIMATED SPLATS AND PLATES --- */ 
.splatted-item { 
  position: absolute; 
  pointer-events: none; 
  z-index: 100; 
  transform: translate(-50%, -50%) scale(0); 
  animation: splatOpen 0.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  user-select: none; 
  -webkit-user-drag: none; 
  transition: opacity 1s ease; 
} 

.splatted-tomato { 
  width: 100px; 
  height: 100px; 
} 

.thrown-dish { 
  width: 120px; 
  height: 120px; 
} 

/* --- DRAWN TRAILS (KETCHUP & MUSTARD) --- */ 
.drawn-splat { 
  position: absolute; 
  border-radius: 50%; 
  pointer-events: none; 
  z-index: 99; 
  transform: translate(-50%, -50%); 
  transition: opacity 1s ease; 
} 

@keyframes splatOpen { 
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 
  100% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.95; } 
} 

/* --- BASE ANIMATIONS --- */ 
@keyframes pat-squish-once { 
  0% { transform: scale(1); } 
  30% { transform: scaleY(0.78) scaleX(1.12); } 
  60% { transform: scaleY(1.08) scaleX(0.94); } 
  100% { transform: scale(1); } 
} 

@keyframes float-up { 
  0% { transform: translateY(0) scale(1); opacity: 1; } 
  100% { transform: translateY(-70px) scale(0.7); opacity: 0; } 
} 
</style> 
</head> 
<body> 

<!-- MAIN 404 CONTAINER --> 
<div class="container" id="main-container"> 
  <!-- Skyeto Box --> 
  <div class="skyeto-box" id="skyeto-pet" onclick="patSkyeto(event)"> 
    <img class="skyeto-character" src="../assets/skyeto-normal.png" alt="Skyeto"> 
  </div> 
  <div id="pat-counter">You've patted Skyeto 0 times >:3</div> 

  <!-- Error Code --> 
  <div class="error-code-container"> 
    <h1 class="error-code-text">404</h1> 
    <div class="invert-box"></div> 
  </div> 

  <!-- Error Message --> 
  <div class="error-message-box"> 
    <div class="left-bar"></div> 
    <p class="message-text"> 
      Sorry for the inconvenience :< , it seems the page <span id="current-url" style="font-weight: bold;">stellanskyeto.github.io/abcxyz</span> doesn't exist anymore. 
    </p> 
  </div> 

  <!-- Redirect Search Bar --> 
  <div class="search-bar-container"> 
    <span class="domain-prefix">stellanskyeto.github.io/</span> 
    <div class="input-wrapper"> 
      <input type="text" class="fake-input" placeholder="Please enter a different link." id="search-input"> 
    </div> 
    <div class="search-icon" onclick="handleSearchRedirect()"> 
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A2028" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"> 
        <circle cx="11" cy="11" r="8"></circle> 
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line> 
      </svg> 
    </div> 
  </div> 

  <!-- Hidden Trigger Secret Link --> 
  <div class="footer-info"> 
    submit bug here : <span class="secret-link" onclick="triggerGravityFall()">@uy.v.189 (TikTok)</span> 
  </div> 
</div> 

<!-- TOMATO ARENA (EASTER EGG PLAYGROUND) --> 
<div class="tomato-arena" id="arena"> 
  <div class="arena-title">🍅 LÊ UY VŨ'S SPECIAL DISH 🍽️</div> 
  <div class="arena-hint">CHOOSE A WEAPON FROM THE DOCK AND HAVE FUN! 💥</div> 

  <div class="dish-wrapper" id="dish-plate"> 
    <!-- Central Plate --> 
    <img class="dish-img" id="plate-image" src="dish.png" alt="Dish"> 
    
    <!-- Outer Ingredients Decorative --> 
    <img class="ingredient tomato-fresh" src="tomato.png" alt="Tomato"> 
    <img class="ingredient ketchup-bottle" src="ketchup.png" alt="Ketchup"> 
    <img class="ingredient mustard-bottle" src="mustard.png" alt="Mustard"> 
    
    <!-- Central Target Portrait --> 
    <img class="leuyvu-tiktok" id="tiktok-avatar" src="leuyvu.png" alt="Uy Vu TikTok"> 
  </div> 

  <!-- WEAPON DOCK --> 
  <div class="weapon-dock" onclick="event.stopPropagation()"> 
    <button class="weapon-btn active" id="btn-tomato" onclick="selectWeapon('tomato')">🍅 Tomato</button> 
    <button class="weapon-btn" id="btn-ketchup" onclick="selectWeapon('ketchup')">🥫 Ketchup</button> 
    <button class="weapon-btn" id="btn-mustard" onclick="selectWeapon('mustard')">🍯 Mustard</button> 
    <button class="weapon-btn" id="btn-dish" onclick="selectWeapon('dish')">🍽️ Plate</button> 
  </div> 
</div> 

<script> 
// Display Current Broken Link URL 
document.getElementById("current-url").innerText = window.location.href; 

// Skyeto Custom Pets Settings 
const imgNormal = "../assets/skyeto-normal.png"; 
const imgHappy = "../assets/skyeto-happy.png"; 
const skyetoImg = document.querySelector(".skyeto-character"); 
const counterEl = document.getElementById("pat-counter"); 
let patCount = 0; 
let resetImgTimeout; 
let fadeOutTimeout; 

function patSkyeto(event) { 
  patCount++; 
  skyetoImg.src = imgHappy; 
  skyetoImg.classList.remove("squish-once"); 
  void skyetoImg.offsetWidth; // Reset layout pipeline to restart animation 
  skyetoImg.classList.add("squish-once"); 
  counterEl.innerText = `You've patted Skyeto ${patCount} times >:3`; 
  counterEl.classList.add("show"); 
  
  clearTimeout(fadeOutTimeout); 
  fadeOutTimeout = setTimeout(() => { 
    counterEl.classList.remove("show"); 
  }, 1000); 

  createHeart(event.clientX, event.clientY); 
  
  clearTimeout(resetImgTimeout); 
  resetImgTimeout = setTimeout(() => { 
    skyetoImg.src = imgNormal; 
  }, 500); 
} 

function createHeart(x, y) { 
  const heart = document.createElement("div"); 
  heart.classList.add("heart"); 
  heart.innerText = "💖"; 
  heart.style.left = `${x - 10}px`; 
  heart.style.top = `${y - 20}px`; 
  document.body.appendChild(heart); 
  setTimeout(() => heart.remove(), 800); 
} 

// Redirection Search Bar Code 
function handleSearchRedirect() { 
  const inputEl = document.getElementById("search-input"); 
  let value = inputEl.value.trim(); 
  if (value === "") return; 
  if (value.startsWith("/")) value = value.substring(1); 
  window.location.href = "/" + value; 
} 

document.getElementById("search-input").addEventListener("keypress", function(e) { 
  if (e.key === "Enter") handleSearchRedirect(); 
}); 


/* ========================================== 
   EASTER EGG EXPANSION BY MINH QUÂN 
   ========================================== */ 
let currentWeapon = 'tomato'; // default weapon 
let isDrawing = false; 

// Setup Sound System API 
const sndSplash = new Audio('splash.wav'); 
const sndBroken = new Audio('broken.wav'); 

function selectWeapon(weaponType) { 
  currentWeapon = weaponType; 
  // Update UI active buttons 
  document.querySelectorAll('.weapon-btn').forEach(btn => btn.classList.remove('active')); 
  document.getElementById(`btn-${weaponType}`).classList.add('active'); 
} 

function triggerGravityFall() { 
  const elementsToFall = [ 
    document.getElementById('skyeto-pet'), 
    document.getElementById('pat-counter'), 
    document.querySelector('.error-code-container'), 
    document.querySelector('.error-message-box'), 
    document.querySelector('.search-bar-container'), 
    document.querySelector('.footer-info') 
  ]; 
  
  elementsToFall.forEach((el, index) => { 
    if (el) { 
      setTimeout(() => { el.classList.add('fall-down'); }, index * 100); 
    } 
  }); 
  
  setTimeout(() => { 
    document.getElementById('main-container').style.display = 'none'; 
    document.getElementById('arena').classList.add('active'); 
  }, 1400); 
} 

// Get Arena Workspace to Attach Interactions 
const arena = document.getElementById('arena'); 

// MOUSE EVENTS FOR ARENA INTERACTION 
arena.addEventListener('mousedown', function(e) { 
  if (currentWeapon === 'ketchup' || currentWeapon === 'mustard') { 
    isDrawing = true; 
    drawSplat(e); 
  } else { 
    throwWeapon(e); 
  } 
}); 

arena.addEventListener('mousemove', function(e) { 
  if (isDrawing && (currentWeapon === 'ketchup' || currentWeapon === 'mustard')) { 
    drawSplat(e); 
  } 
}); 

window.addEventListener('mouseup', function() { 
  isDrawing = false; 
}); 

// Weapon Throw Logic (Tomato & Plate) 
function throwWeapon(e) { 
  // Screen shaking physics 
  arena.classList.remove('arena-shake'); 
  void arena.offsetWidth; 
  arena.classList.add('arena-shake'); 

  const splat = document.createElement('img'); 
  const randomRotation = Math.floor(Math.random() * 360); 

  if (currentWeapon === 'tomato') { 
    // Play splash sound 
    sndSplash.currentTime = 0; 
    sndSplash.play().catch(err => console.log("Sound load blocked")); 

    splat.src = 'splashed-tomato.png'; 
    splat.classList.add('splatted-item', 'splatted-tomato'); 
    splat.style.left = e.clientX + 'px'; 
    splat.style.top = e.clientY + 'px'; 
    splat.style.transform = `translate(-50%, -50%) rotate(${randomRotation}deg)`; 
    arena.appendChild(splat); 

    // Destructive trigger on center plate 
    checkCenterPlateHit(e); 

  } else if (currentWeapon === 'dish') { 
    // Play glass break sound 
    sndBroken.currentTime = 0; 
    sndBroken.play().catch(err => console.log("Sound load blocked")); 

    splat.src = 'broken-dish.png'; 
    splat.classList.add('splatted-item', 'thrown-dish'); 
    splat.style.left = e.clientX + 'px'; 
    splat.style.top = e.clientY + 'px'; 
    splat.style.transform = `translate(-50%, -50%) rotate(${randomRotation}deg)`; 
    arena.appendChild(splat); 
  } 

  // Trigger self-cleaning system: fade out & remove after 10 seconds 
  triggerAutoClean(splat); 
} 

// Drawing system (Ketchup & Mustard) 
function drawSplat(e) { 
  const dot = document.createElement('div'); 
  dot.classList.add('drawn-splat'); 
  
  // Set paint properties 
  const size = Math.floor(Math.random() * 12) + 14; // Random stroke dynamics 
  dot.style.width = size + 'px'; 
  dot.style.height = size + 'px'; 
  dot.style.left = e.clientX + 'px'; 
  dot.style.top = e.clientY + 'px'; 

  if (currentWeapon === 'ketchup') { 
    dot.style.backgroundColor = '#B81D24'; // Realistic rich tomato ketchup 
    dot.style.boxShadow = 'inset 0 2px 4px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2)'; 
  } else if (currentWeapon === 'mustard') { 
    dot.style.backgroundColor = '#E1AD01'; // Spicy mustard yellow 
    dot.style.boxShadow = 'inset 0 2px 4px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2)'; 
  } 

  arena.appendChild(dot); 
  triggerAutoClean(dot); 
} 

// Original Easter Egg target plate breaking logic 
let isDishBroken = false; 
function checkCenterPlateHit(e) { 
  const plate = document.getElementById('plate-image'); 
  const tiktokImg = document.getElementById('tiktok-avatar'); 
  const dishRect = document.getElementById('dish-plate').getBoundingClientRect(); 

  if ( 
    e.clientX >= dishRect.left && e.clientX <= dishRect.right && 
    e.clientY >= dishRect.top && e.clientY <= dishRect.bottom && 
    !isDishBroken 
  ) { 
    isDishBroken = true; 
    plate.src = 'broken-dish.png'; 
    tiktokImg.style.transform = 'rotate(-15deg) translateY(20px)'; 
    tiktokImg.style.opacity = '0.8'; 
    
    // Play glass break sound as well! 
    sndBroken.currentTime = 0; 
    sndBroken.play().catch(err => console.log("Sound load blocked")); 
  } 
} 

// Automatic 10-Second Cleaning Engine 
function triggerAutoClean(element) { 
  // Start fading out after 9 seconds 
  setTimeout(() => { 
    element.style.opacity = '0'; 
  }, 9000); 

  // Completely wipe out from the DOM at 10 seconds 
  setTimeout(() => { 
    element.remove(); 
  }, 10000); 
} 
</script> 
</body> 
</html>
